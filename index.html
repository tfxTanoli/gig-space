<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- viewport-fit=cover exposes env(safe-area-inset-*) so fixed/sticky UI can
         clear the iOS status bar / notch instead of hiding behind it. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Match the browser/status-bar chrome to the app background on mobile. -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <title>Gigspace</title>

    <!-- On iPhone the top of the page sits directly under the status bar: modern
         Safari puts its address bar at the BOTTOM, and home-screen apps have no
         chrome at all. env(safe-area-inset-top) is meant to cover this, but Apple
         reports it as 0 on non-notch iPhones (SE/8-class) — so the env()-only
         padding silently did nothing and the logo/hamburger stayed under the
         clock. Flag every iPhone/iPod here (covers Safari *and* standalone) so CSS
         can floor the inset to the 20px status-bar height. Gated to iPhone/iPod
         only: iPad/desktop/Android keep a 0 inset and gain no unwanted gap. -->
    <script>
      (function () {
        var root = document.documentElement;
        if (/iPhone|iPod/.test(window.navigator.userAgent)) root.classList.add('ios-phone');

        // Capture the real top inset and remember the largest value ever seen.
        // The dashboards lock scrolling (overflow:hidden on <html>) to run as a
        // fixed app shell, and iOS then reports env(safe-area-inset-top) as 0 —
        // which drops a notch / Dynamic-Island header back under the status bar
        // (the CSS floor is only 20px, ~24px short of a 44px notch). env() is
        // still correct on the scrollable browse/detail pages and at first load,
        // so measure there and keep the max: the dashboard then reuses the true
        // notch height even when its own env() reads 0. Non-notch iPhones never
        // report an inset, so they keep relying on the 20px floor in CSS.
        var max = 0;
        function measure() {
          var probe = measure.el;
          if (!probe) return;
          var h = probe.getBoundingClientRect().height;
          if (h > max) { max = h; root.style.setProperty('--safe-top-measured', max + 'px'); }
        }
        function init() {
          var probe = document.createElement('div');
          probe.style.cssText =
            'position:fixed;top:0;left:0;width:0;height:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none;';
          document.body.appendChild(probe);
          measure.el = probe;
          measure();
          // env settles a frame or two after load / bfcache restore / toolbar
          // transitions — re-measure on the events that mark those moments.
          window.addEventListener('resize', measure, { passive: true });
          window.addEventListener('orientationchange', measure);
          window.addEventListener('pageshow', measure);
          if (window.visualViewport)
            window.visualViewport.addEventListener('resize', measure, { passive: true });
        }
        if (document.body) init();
        else document.addEventListener('DOMContentLoaded', init);
      })();
    </script>

    <!-- Warm up the connections the first paint depends on so auth/db/storage
         requests don't pay TLS setup on the critical path. -->
    <link rel="preconnect" href="https://identitytoolkit.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://securetoken.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://gigspace-208b4-default-rtdb.firebaseio.com" crossorigin />
    <link rel="preconnect" href="https://firebasestorage.googleapis.com" crossorigin />

    <!-- Fonts, loaded non-render-blocking: preload the stylesheet then flip it to
         a real stylesheet on load. Text paints immediately in the system fallback
         and swaps to Inter when ready, instead of blocking first paint. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
  </head>
  <body>
    <!-- Instant first-paint spinner. React's createRoot replaces #root's
         contents on mount, so this disappears the moment the app boots — it just
         fills the gap between the (render-blocking) CSS painting and the JS
         bundle finishing, instead of showing an empty dark screen. -->
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f172a">
        <div style="width:2rem;height:2rem;border:2px solid #3b82f6;border-top-color:transparent;border-radius:9999px;animation:appboot-spin .7s linear infinite"></div>
      </div>
    </div>
    <style>@keyframes appboot-spin{to{transform:rotate(360deg)}}</style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
